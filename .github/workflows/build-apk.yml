name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags, needed to diff commits since the last release
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          # Skipped on forks: they have no secrets, so they build debug-signed.
          if [ -n "$RELEASE_KEYSTORE_B64" ]; then
            echo "$RELEASE_KEYSTORE_B64" | base64 -d > android/app/release.keystore
          fi

      - name: Decode Firebase Android config
        env:
          FIREBASE_CONFIG_B64: ${{ secrets.FIREBASE_CONFIG_B64 }}
        run: |
          if [ -z "$FIREBASE_CONFIG_B64" ]; then
            echo "FIREBASE_CONFIG_B64 is not configured"
            exit 1
          fi
          printf '%s' "$FIREBASE_CONFIG_B64" | base64 -d > android/app/google-services.json

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: chmod +x android/gradlew && cd android && ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk helix.apk

      - uses: actions/upload-artifact@v4
        with:
          name: helix-apk
          path: helix.apk

      - name: Build release notes
        if: github.ref == 'refs/heads/main'
        run: |
          # The "latest" tag still points at the previous release's commit,
          # so latest..HEAD is exactly what changed since the last build.
          if git rev-parse -q --verify refs/tags/latest >/dev/null; then
            RAW="$(git log latest..HEAD --no-merges --pretty='- %s (%h)')"
          else
            RAW="$(git log -10 --no-merges --pretty='- %s (%h)')"
          fi
          # Hide internal commits (ci:, chore:, ...) from the public changelog;
          # git history keeps them. Also read by the in-app update popup.
          NOTES="$(printf '%s\n' "$RAW" | grep -Ev '^- (ci|chore|build|docs|test|refactor)(\([^)]*\))?:' || true)"
          [ -z "$NOTES" ] && NOTES="- Maintenance update (no user-facing changes)"
          {
            echo 'RELEASE_NOTES<<NOTES_EOF'
            echo "## What's changed"
            echo "$NOTES"
            echo ''
            # Full 40-char SHA required: the app's update check parses it
            # out of the release body (services/updateCheck.ts releaseCommit)
            echo "Build: ${GITHUB_SHA}"
            echo 'NOTES_EOF'
          } >> "$GITHUB_ENV"

      - name: Update "latest" release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Helix (latest)
          body: ${{ env.RELEASE_NOTES }}
          files: helix.apk
          prerelease: false
