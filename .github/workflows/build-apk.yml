name: Build APK

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --quiet

      - name: Run regression checks
        run: npm run test:regressions

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Build Functions
        run: npm run build --prefix functions

  build:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm ci

      - name: Validate release secrets
        env:
          FIREBASE_CONFIG_B64: ${{ secrets.FIREBASE_CONFIG_B64 }}
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          for name in \
            FIREBASE_CONFIG_B64 \
            RELEASE_KEYSTORE_B64 \
            RELEASE_KEYSTORE_PASSWORD \
            RELEASE_KEY_ALIAS \
            RELEASE_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: printf '%s' "$RELEASE_KEYSTORE_B64" | base64 -d > android/app/release.keystore

      - name: Decode Firebase Android config
        env:
          FIREBASE_CONFIG_B64: ${{ secrets.FIREBASE_CONFIG_B64 }}
        run: printf '%s' "$FIREBASE_CONFIG_B64" | base64 -d > android/app/google-services.json

      - name: Test and build release APK
        env:
          HELIX_DISTRIBUTION: github
          NODE_ENV: production
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew testReleaseUnitTest assembleRelease --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk helix.apk

      - uses: actions/upload-artifact@v7
        with:
          name: helix-apk
          path: helix.apk

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags are needed to build notes from the closest
          # rolling or versioned release.
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: helix-apk

      - name: Build release notes
        run: |
          BASE_REF=""
          if git rev-parse -q --verify refs/tags/latest >/dev/null; then
            BASE_REF="latest"
          fi

          VERSION_TAG="$(git tag --list 'v[0-9]*' --sort=-version:refname | head -n 1)"
          if [ -n "$VERSION_TAG" ] && git merge-base --is-ancestor "$VERSION_TAG" HEAD; then
            if [ -z "$BASE_REF" ] || \
              [ "$(git rev-list --count "$VERSION_TAG"..HEAD)" -lt "$(git rev-list --count "$BASE_REF"..HEAD)" ]; then
              BASE_REF="$VERSION_TAG"
            fi
          fi

          if [ -n "$BASE_REF" ]; then
            RAW="$(git log "$BASE_REF"..HEAD --no-merges --pretty='- %s (%h)')"
          else
            RAW="$(git log -10 --no-merges --pretty='- %s (%h)')"
          fi

          # Hide internal commits (ci:, chore:, ...) from the public changelog;
          # git history keeps them. Also read by the in-app update popup.
          NOTES="$(printf '%s\n' "$RAW" | grep -Ev '^- (ci|chore|build|docs|test|refactor)(\([^)]*\))?:' || true)"
          [ -z "$NOTES" ] && NOTES="- Maintenance update (no user-facing changes)"
          {
            echo 'RELEASE_NOTES<<NOTES_EOF'
            echo "## What's changed"
            echo "$NOTES"
            echo ''
            # Full 40-char SHA required: the app's update check parses it
            # out of the release body (services/updateCheck.ts releaseCommit)
            echo "Build: ${GITHUB_SHA}"
            echo 'NOTES_EOF'
          } >> "$GITHUB_ENV"

      - name: Advance rolling release tag
        run: |
          git tag --force latest "$GITHUB_SHA"
          git push origin refs/tags/latest --force

      - name: Update "latest" release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Helix (latest)
          body: ${{ env.RELEASE_NOTES }}
          files: helix.apk
          prerelease: false
